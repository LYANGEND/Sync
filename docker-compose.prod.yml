version: '3.8'

services:
  backend:
    image: ghcr.io/lyangend/sync/backend:master
    container_name: sync_backend
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # PORT is NOT set here — the image default (3000) is used.
      # JWT_SECRET is NOT set here — env_file: .env provides it cleanly.
    ports:
      - "3002:3000"   # host:3002 → container:3000 (app default port)
    networks:
      - sync_network

  frontend:
    image: ghcr.io/lyangend/sync/frontend:master
    container_name: sync_frontend
    restart: always
    ports:
      - "3003:80"
    depends_on:
      - backend
    networks:
      - sync_network

networks:
  sync_network:
    driver: bridge