version: '3.8'

services:
  backend:
    image: ghcr.io/lyangend/sync/backend:master
    container_name: sync_backend
    restart: always
    env_file:
      - .env
    environment:
      - PORT=3002
      - NODE_ENV=production
      # JWT_SECRET intentionally NOT here — env_file: .env provides it.
      # Writing JWT_SECRET=${JWT_SECRET} here would override .env with an empty
      # string (because docker-compose expands from the HOST shell, not .env),
      # causing jwt.verify to use the fallback 'supersecretkey' and return 403.
    ports:
      - "3002:3002"   # expose to host so system nginx (localhost:3002) can reach it
    networks:
      - sync_network

  frontend:
    image: ghcr.io/lyangend/sync/frontend:master
    container_name: sync_frontend
    restart: always
    ports:
      - "3003:80"
    depends_on:
      - backend
    networks:
      - sync_network

networks:
  sync_network:
    driver: bridge