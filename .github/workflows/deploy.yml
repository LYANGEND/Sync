name: Build and Deploy SYNC

on:
  push:
    branches:
      - master  # Single-tenant system
      - power   # Multi-tenant system (ops platform)

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: lyangend/sync

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine deployment configuration
        id: config
        run: |
          if [ "${{ github.ref_name }}" == "master" ]; then
            # Single-tenant: frontend proxies API via nginx /api → backend
            echo "tag=master" >> $GITHUB_OUTPUT
            echo "vite_api_url=/api" >> $GITHUB_OUTPUT
            echo "deployment=single-tenant" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "app_dir=~/app" >> $GITHUB_OUTPUT
          else
            # Multi-tenant configuration
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "vite_api_url=/api" >> $GITHUB_OUTPUT
            echo "deployment=multi-tenant" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "app_dir=~/app-mt" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.config.outputs.tag }}
          build-args: |
            VITE_API_URL=${{ steps.config.outputs.vite_api_url }}
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ matrix.service }}
          platforms: linux/amd64

      - name: Image details
        run: |
          echo "✅ Built: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.config.outputs.tag }}"
          echo "📦 Deployment: ${{ steps.config.outputs.deployment }}"
          echo "🔧 VITE_API_URL: ${{ steps.config.outputs.vite_api_url }}"

  # Auto-deploy to server via SSH after both images are built
  deploy-to-server:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Check SSH secrets are configured
        id: check
        run: |
          if [ -n "${{ secrets.HOST }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ HOST secret not set — skipping server deployment."
          fi

      - name: Checkout code (needed to copy compose file to server)
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Determine deploy config
        id: config
        if: steps.check.outputs.configured == 'true'
        run: |
          if [ "${{ github.ref_name }}" == "master" ]; then
            echo "tag=master" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "app_dir=~/app" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "app_dir=~/app-mt" >> $GITHUB_OUTPUT
          fi

      - name: Copy docker-compose.prod.yml to server
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: ${{ steps.config.outputs.app_dir }}

      - name: Deploy to server via SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deploying ${{ github.ref_name }} to server..."

            # Go to app directory
            cd ${{ steps.config.outputs.app_dir }}

            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Use docker-compose v1 (installed as separate binary on this server)
            COMPOSE="docker-compose"
            if ! command -v docker-compose &> /dev/null; then
              COMPOSE="docker compose"
            fi

            # Pull new images
            echo "📥 Pulling new images (tag: ${{ steps.config.outputs.tag }})..."
            $COMPOSE -f ${{ steps.config.outputs.compose_file }} pull

            # Restart containers with new images
            # Stop+rm first to avoid docker-compose v1.29.2 bug: KeyError 'ContainerConfig'
            # (v1.29.2 can't recreate containers from modern BuildKit images — must create fresh)
            echo "🔄 Restarting backend..."
            $COMPOSE -f ${{ steps.config.outputs.compose_file }} stop backend || true
            $COMPOSE -f ${{ steps.config.outputs.compose_file }} rm -f backend || true
            $COMPOSE -f ${{ steps.config.outputs.compose_file }} up -d --no-deps backend

            # Wait for backend to be ready, then run any pending migrations
            echo "⏳ Waiting for backend to start..."
            sleep 8
            echo "🗄️ Running Prisma migrations..."
            MIGRATE_OUTPUT=$(docker exec sync_backend npx prisma migrate deploy 2>&1) && {
              echo "$MIGRATE_OUTPUT"
            } || {
              echo "$MIGRATE_OUTPUT"
              echo "⚠️ Migration failed — checking for recoverable failed-migration state..."
              FAILED=$(echo "$MIGRATE_OUTPUT" | sed -n 's/.*The `\([^`]*\)` migration.*failed.*/\1/p')
              if [ -n "$FAILED" ]; then
                echo "🔧 Auto-resolving failed migration: $FAILED"
                docker exec sync_backend npx prisma migrate resolve --rolled-back "$FAILED"
                echo "🔄 Re-running prisma migrate deploy..."
                docker exec sync_backend npx prisma migrate deploy
              else
                echo "❌ Prisma migrate deploy failed with an unrecoverable error."
                docker exec sync_backend npx prisma migrate status || true
                exit 1
              fi
            }
            echo "✅ Migrations applied"

            echo "🔄 Restarting frontend..."
            $COMPOSE -f ${{ steps.config.outputs.compose_file }} stop frontend || true
            $COMPOSE -f ${{ steps.config.outputs.compose_file }} rm -f frontend || true
            $COMPOSE -f ${{ steps.config.outputs.compose_file }} up -d --no-deps frontend

            # Clean up old images to save disk space
            docker image prune -f

            echo "✅ Deployment complete!"
            $COMPOSE -f ${{ steps.config.outputs.compose_file }} ps

  summary:
    needs: [build-and-push, deploy-to-server]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Build & Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** ${{ needs.build-and-push.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Server Deploy:** ${{ needs.deploy-to-server.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.ref_name }}" == "master" ]; then
            echo "**System:** Single-tenant" >> $GITHUB_STEP_SUMMARY
            echo "**Tag:** \`:master\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Images Built:" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/lyangend/sync/frontend:master\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/lyangend/sync/backend:master\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**System:** Multi-tenant (Ops Platform)" >> $GITHUB_STEP_SUMMARY
            echo "**Tag:** \`:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Images Built:" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/lyangend/sync/frontend:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/lyangend/sync/backend:latest\`" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-to-server.result }}" == "skipped" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Auto-deploy skipped** — add SSH_HOST, SSH_USER, SSH_KEY secrets to enable automatic server deployment." >> $GITHUB_STEP_SUMMARY
          fi
