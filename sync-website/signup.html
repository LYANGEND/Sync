<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Free Trial - Sync School Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            padding: 40px 24px;
        }

        .signup-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-xl);
            padding: 48px;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .signup-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .signup-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .signup-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 24px;
        }

        .form-checkbox input {
            margin-top: 4px;
        }

        .form-checkbox label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-checkbox a {
            color: var(--primary);
            text-decoration: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .signup-benefits {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .benefit-icon {
            color: var(--success);
            font-weight: 700;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .signup-container {
                padding: 32px 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="signup-page">
        <div class="signup-container">
            <div class="signup-header">
                <div class="signup-logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="8" fill="#2563eb"/>
                        <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="logo-text">Sync</span>
                </div>
                <h1 class="signup-title">Start Your Free Trial</h1>
                <p class="signup-subtitle">14 days free. No credit card required.</p>
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="schoolName">School Name *</label>
                    <input type="text" id="schoolName" name="schoolName" class="form-input" required placeholder="e.g., Lusaka International School">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" class="form-input" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" class="form-input" required placeholder="Banda">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address *</label>
                    <input type="email" id="email" name="email" class="form-input" required placeholder="john@school.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" class="form-input" required placeholder="+260 XXX XXX XXX">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="role">Your Role *</label>
                        <select id="role" name="role" class="form-select" required>
                            <option value="">Select role</option>
                            <option value="principal">Principal</option>
                            <option value="headteacher">Head Teacher</option>
                            <option value="bursar">Bursar</option>
                            <option value="admin">Administrator</option>
                            <option value="owner">School Owner</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="students">Number of Students *</label>
                        <select id="students" name="students" class="form-select" required>
                            <option value="">Select range</option>
                            <option value="0-100">0-100</option>
                            <option value="101-300">101-300</option>
                            <option value="301-500">301-500</option>
                            <option value="501-1000">501-1,000</option>
                            <option value="1000+">1,000+</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="city">City *</label>
                    <input type="text" id="city" name="city" class="form-input" required placeholder="Lusaka">
                </div>

                <div class="form-group">
                    <label class="form-label" for="hearAbout">How did you hear about us?</label>
                    <select id="hearAbout" name="hearAbout" class="form-select">
                        <option value="">Select option</option>
                        <option value="google">Google Search</option>
                        <option value="facebook">Facebook</option>
                        <option value="referral">Referral from another school</option>
                        <option value="conference">Education Conference</option>
                        <option value="ministry">Ministry of Education</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        I agree to the <a href="#terms">Terms of Service</a> and <a href="#privacy">Privacy Policy</a>
                    </label>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="marketing" name="marketing">
                    <label for="marketing">
                        Send me product updates and educational resources
                    </label>
                </div>

                <button type="submit" class="submit-btn">Start Free Trial</button>
            </form>

            <div class="signup-benefits">
                <div class="benefit-item">
                    <span class="benefit-icon">✓</span>
                    <span>14 days free trial - no credit card required</span>
                </div>
                <div class="benefit-item">
                    <span class="benefit-icon">✓</span>
                    <span>Full access to all features</span>
                </div>
                <div class="benefit-item">
                    <span class="benefit-icon">✓</span>
                    <span>Free training and onboarding</span>
                </div>
                <div class="benefit-item">
                    <span class="benefit-icon">✓</span>
                    <span>Cancel anytime - no commitment</span>
                </div>
            </div>

            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // Show loading state
            const submitBtn = this.querySelector('.submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Creating your account...';
            submitBtn.disabled = true;
            
            // Simulate API call (replace with actual API endpoint)
            setTimeout(() => {
                // Success
                alert('Thank you! Your trial account has been created. Check your email for login details.');
                
                // Redirect to app or thank you page
                // window.location.href = 'https://app.sync.education/login';
                
                // Reset form
                this.reset();
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }, 2000);

            /*

                }
            })
            .catch(error => {
                alert('Error: ' + error.message);
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            });
            */
        });

        // Phone number formatting
        document.getElementById('phone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.startsWith('260')) {
                value = '+' + value;
            } else if (value.startsWith('0')) {
                value = '+260' + value.substring(1);
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
